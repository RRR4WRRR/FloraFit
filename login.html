<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | FloraFit</title>
    <link rel="icon" type="image/png" href="assets/img/Flora.png">
    <link rel="stylesheet" href="assets/css/auth.css">
    <link rel="stylesheet" href="assets/css/notifications.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>

<div class="auth-container">
    <div class="auth-card">
        <h2>Welcome Back 🌷</h2>
        <p>Log in to continue designing your dream bouquet</p>

        <form id="loginForm">
            <input type="email" id="loginEmail" placeholder="Email Address" required>
            
            <div class="password-wrapper">
                <input type="password" id="loginPassword" placeholder="Password" required>
                <span class="toggle-password" onclick="togglePassword('loginPassword', this)"><i class="fas fa-eye"></i></span>
            </div>
            
            <button type="submit">Login</button>
        </form>

        <p class="forgot-link">
            <a href="forgot.html">Forgot password?</a>
        </p>

        <p class="switch">
            Don't have an account?
            <a href="signup.html">Sign up</a>
        </p>
    </div>
</div>

<script src="assets/js/notifications.js"></script>
<script src="assets/js/login.js"></script>
</body>
</html>
